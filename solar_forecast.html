<script>
(function() {
  'use strict';

  window.initSolaNightSky = function(lat, lon) {
    if (typeof lat !== 'number' || typeof lon !== 'number') return;

    if (typeof fetchOvernightCloud === 'function') fetchOvernightCloud(lat, lon);
    if (typeof fetchVisiblePlanets === 'function') fetchVisiblePlanets(lat, lon);
    if (typeof renderMoonPhase === 'function') renderMoonPhase();
    if (typeof renderAstronomyEvents === 'function') renderAstronomyEvents();
  };

})();
