  <!-- Page Styles -->
  <style>
    /* ============================================
       DESIGN TOKENS &mdash; matches site brand
       ============================================ */
    :root {
      --sola-teal: #00CED1;
      --sola-teal-dark: #008B8B;
      --sola-teal-glow: rgba(0, 206, 209, 0.4);
      --sola-teal-bright: #00E5E8;
      --sola-gold: #D4AF37;
      --sola-gold-dark: #DAA520;
      --sola-gold-glow: rgba(255, 215, 0, 0.3);
      --sola-emerald: #0B2F26;
      --bg-primary: #0B2F26;
      --bg-secondary: rgba(8, 26, 21, 0.92);
      --bg-card: rgba(8, 26, 21, 0.78);
      --bg-card-solid: #0F2C26;
      --text-primary: #e8f0f7;
      --text-secondary: #8899a8;
      --text-muted: #5a6a7a;
      --profit: #00e676;
      --loss: #ff5252;
      --border-color: rgba(212, 175, 55, 0.18);
      --border-gold: rgba(255, 215, 0, 0.3);

      /* Night sky &mdash; page accents */
      --night-deep: #0a0f2c;
      --night-mid: #1a1f4a;
      --night-violet: #2d1b69;
      --star-bright: #fef3c7;
      --moon-cream: #fffbeb;
      --rating-perfect: #4ade80;
      --rating-good: #a3e635;
      --rating-fair: #facc15;
      --rating-poor: #fb923c;
      --rating-skip: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background-color: var(--sola-emerald);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600' viewBox='0 0 600 600'><rect width='600' height='600' fill='none'/><g stroke='%23D4AF37' stroke-width='2' fill='none' opacity='0.18' stroke-linecap='round' stroke-linejoin='round'><path d='M40 80 H210 V140 H360'/><path d='M120 220 H260 V180 H420 V240 H560'/><path d='M60 340 H220 V400 H360 V460 H520'/><path d='M300 40 V170 H460 V120 H560'/><path d='M40 520 H180 V460 H320 V540 H560'/><path d='M520 60 V200 H420 V320 H560'/></g><g fill='%23D4AF37' opacity='0.25'><circle cx='210' cy='140' r='4'/><circle cx='260' cy='180' r='4'/><circle cx='420' cy='240' r='4'/><circle cx='360' cy='460' r='4'/><circle cx='460' cy='120' r='4'/></g></svg>");
      background-repeat: repeat;
      background-position: 0 0;
      background-size: 600px 600px;
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3 { font-family: 'Noto Sans JP', sans-serif; }
    a { color: var(--sola-teal); text-decoration: none; }
    a:hover { color: var(--sola-gold); }

    /* ============================================
       HAMBURGER MENU + NAV DRAWER
       (styles match other site pages)
       ============================================ */
    .hamburger-menu { position: fixed; top: 1rem; left: 1rem; z-index: 1000; }
    .hamburger-btn { background: var(--bg-card); border: 2px solid var(--sola-teal); color: var(--sola-teal); width: 44px; height: 44px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; transition: all 0.3s ease; box-shadow: 0 0 10px rgba(0, 206, 209, 0.4); }
    .hamburger-btn:hover { background: var(--sola-teal); box-shadow: 0 0 20px rgba(0, 206, 209, 0.4); }
    .hamburger-btn .bun-top { width: 24px; height: 6px; background: linear-gradient(180deg, #F4A460 0%, #DEB887 100%); border-radius: 10px 10px 0 0; transition: all 0.3s ease; }
    .hamburger-btn .lettuce { width: 26px; height: 3px; background: #32CD32; border-radius: 1px; transition: all 0.3s ease; }
    .hamburger-btn .patty { width: 24px; height: 4px; background: linear-gradient(180deg, #8B4513 0%, #654321 100%); border-radius: 2px; transition: all 0.3s ease; }
    .hamburger-btn .cheese { width: 26px; height: 3px; background: #FFD700; border-radius: 1px; transform: skewX(-5deg); transition: all 0.3s ease; }
    .hamburger-btn .bun-bottom { width: 24px; height: 5px; background: linear-gradient(180deg, #DEB887 0%, #F4A460 100%); border-radius: 0 0 6px 6px; transition: all 0.3s ease; }
    .hamburger-btn.open .bun-top { transform: rotate(45deg) translate(6px, 8px); }
    .hamburger-btn.open .lettuce { opacity: 0; }
    .hamburger-btn.open .patty { opacity: 0; }
    .hamburger-btn.open .cheese { opacity: 0; }
    .hamburger-btn.open .bun-bottom { transform: rotate(-45deg) translate(6px, -8px); }
    .nav-drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; overflow-y: auto; background: var(--bg-secondary); border-right: 2px solid var(--sola-teal); z-index: 999; transition: left 0.3s ease; padding: 70px 1.5rem 1.5rem; box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5); }
    .nav-drawer.open { left: 0; }
    .nav-drawer h3 { color: var(--sola-gold); font-size: 1rem; padding-left: 50px; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(212, 175, 55, 0.3); letter-spacing: 2px; text-transform: uppercase; }
    .nav-drawer a { display: block; color: var(--text-primary); text-decoration: none; padding: 0.5rem 1rem; margin-bottom: 0.3rem; border-radius: 6px; font-size: 1rem; transition: all 0.2s ease; border: 1px solid transparent; }
    .nav-drawer a:hover { background: var(--bg-card); border-color: var(--sola-teal); color: var(--sola-teal); }
    .nav-drawer a.active { background: rgba(0, 206, 209, 0.15); border-color: var(--sola-teal); color: #ffffff; }
    .nav-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 998; }
    .nav-overlay.show { display: block; }

    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }

    /* ============================================
       HEADER
       ============================================ */
    header.page-header {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 1.5rem;
      background: linear-gradient(180deg, rgba(45, 27, 105, 0.18) 0%, transparent 100%);
    }

    .page-header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--sola-teal), var(--sola-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.5rem 0;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 620px;
      margin: 0.5rem auto 0;
    }

    /* ============================================
       SECTIONS / CARDS
       ============================================ */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
    }

    .section-title {
      font-size: 1.15rem;
      color: var(--sola-gold);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      letter-spacing: 0.02em;
    }

    /* ============================================
       ZIP CODE INPUT &mdash; entry point
       ============================================ */
    .zip-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-top: 1rem;
    }
    .zip-intro {
      color: var(--text-secondary);
      font-size: 0.95rem;
      text-align: center;
      max-width: 520px;
      margin: 0;
    }
    .zip-form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .zip-form input {
      padding: 0.65rem 0.9rem;
      background: var(--bg-card-solid);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 6px;
      font-family: inherit;
      font-size: 1rem;
      width: 140px;
      letter-spacing: 0.1em;
      text-align: center;
    }
    .zip-form input:focus {
      outline: none;
      border-color: var(--sola-teal);
      box-shadow: 0 0 8px var(--sola-teal-glow);
    }
    .zip-btn {
      padding: 0.65rem 1.5rem;
      background: linear-gradient(135deg, var(--sola-teal), var(--sola-teal-dark));
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      letter-spacing: 0.05em;
    }
    .zip-btn:hover { opacity: 0.9; }
    .zip-error {
      color: var(--loss);
      font-size: 0.85rem;
      margin-top: 0.25rem;
      min-height: 1rem;
    }

    /* Location bar (after zip submitted) */
    .location-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      margin: 0 auto 1.25rem;
      padding: 0.5rem 0.75rem 0.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 999px;
    }
    .location-bar-wrap { text-align: center; }
    .loc-label { color: var(--text-muted); font-size: 0.8rem; }
    .loc-name { color: var(--sola-teal); font-weight: 700; font-size: 1.05rem; }
    .change-zip-btn {
      background: transparent;
      border: 1px solid rgba(0, 206, 209, 0.4);
      color: var(--sola-teal);
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
    }
    .change-zip-btn:hover { background: rgba(0, 206, 209, 0.1); }

    /* Loading spinner */
    .loading-wrap { text-align: center; padding: 2rem 1rem; }
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid rgba(0, 206, 209, 0.25);
      border-top-color: var(--sola-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================
       SOLA AVATAR / VOICE BLOCKS
       ============================================ */
    .sola-voice {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 1rem 1.1rem;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.06), rgba(0, 206, 209, 0.04));
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 10px;
      margin: 1rem 0;
    }
    .sola-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sola-gold), #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(212, 175, 55, 0.35);
    }
    .sola-text {
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .sola-text strong { color: var(--sola-gold); }

    /* ============================================
       SKY RATING BADGE (used by Phase 2)
       ============================================ */
    .rating-badge {
      display: inline-block;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .rating-perfect { background: rgba(74, 222, 128, 0.18); color: var(--rating-perfect); border: 1px solid rgba(74, 222, 128, 0.4); }
    .rating-good    { background: rgba(163, 230, 53, 0.18); color: var(--rating-good);    border: 1px solid rgba(163, 230, 53, 0.4); }
    .rating-fair    { background: rgba(250, 204, 21, 0.18); color: var(--rating-fair);    border: 1px solid rgba(250, 204, 21, 0.4); }
    .rating-poor    { background: rgba(251, 146, 60, 0.18); color: var(--rating-poor);    border: 1px solid rgba(251, 146, 60, 0.4); }
    .rating-skip    { background: rgba(239, 68, 68, 0.18);  color: var(--rating-skip);    border: 1px solid rgba(239, 68, 68, 0.4); }

    /* ============================================
       MOON PANEL (Phase 2)
       ============================================ */
    .moon-panel {
      text-align: center;
      padding: 0.85rem;
      background: rgba(10, 15, 44, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: 10px;
    }
    .moon-glyph {
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 0.4rem;
      filter: drop-shadow(0 0 12px rgba(255, 251, 235, 0.4));
    }
    .moon-phase-name { font-weight: 700; color: var(--moon-cream); font-size: 0.95rem; }
    .moon-illum { font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .moon-rise-set { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem; }

    /* ============================================
       HOURLY STRIP (Phase 2)
       ============================================ */
    .hourly-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 0.5rem 0.25rem;
      margin-top: 0.5rem;
    }
    .hour-cell {
      flex: 0 0 auto;
      min-width: 52px;
      text-align: center;
      padding: 0.5rem 0.3rem;
      border-radius: 6px;
      background: var(--bg-card-solid);
      border: 1px solid rgba(212, 175, 55, 0.12);
    }
    .hour-time { font-size: 0.72rem; color: var(--text-muted); }
    .hour-cloud { font-size: 0.85rem; font-weight: 700; margin-top: 0.2rem; }

    /* ============================================
       7-NIGHT OUTLOOK (Phase 3)
       ============================================ */
    .night-outlook {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 0.5rem;
    }
    .night-card {
      background: var(--bg-card-solid);
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: 8px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }
    .night-card.best-night {
      border-color: var(--sola-gold);
      box-shadow: 0 0 14px rgba(212, 175, 55, 0.3);
    }
    .night-day { font-size: 0.75rem; color: var(--text-muted); }
    .night-date { font-weight: 700; color: var(--text-primary); font-size: 0.95rem; margin-top: 0.15rem; }

    /* ============================================
       SATELLITE / ISS PASS LIST (Phase 3)
       ============================================ */
    .pass-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .pass-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.85rem;
      background: var(--bg-card-solid);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .pass-name { font-weight: 700; color: var(--sola-teal); }
    .pass-time { color: var(--text-primary); }
    .pass-detail { color: var(--text-muted); font-size: 0.8rem; }

    /* ============================================
       UPCOMING EVENTS PANEL (Phase 4)
       ============================================ */
    .event-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .event-item {
      padding: 0.75rem 1rem;
      background: var(--bg-card-solid);
      border-left: 3px solid var(--sola-gold);
      border-radius: 0 6px 6px 0;
    }
    .event-date { font-size: 0.75rem; color: var(--sola-gold); font-weight: 700; letter-spacing: 0.05em; }
    .event-title { font-weight: 700; color: var(--text-primary); margin-top: 0.2rem; }
    .event-desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.3rem; }

    /* ============================================
       APOD PANEL (Phase 4)
       ============================================ */
    .apod-panel { text-align: center; }
    .apod-image {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      margin-bottom: 0.75rem;
    }
    .apod-title { color: var(--sola-gold); font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; }
    .apod-explanation { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.55; text-align: left; }

    /* ============================================
       BRIDGE PANEL TO MINING (Phase 4)
       ============================================ */
    .bridge-panel {
      background: linear-gradient(135deg, rgba(0, 206, 209, 0.08), rgba(212, 175, 55, 0.06));
      border: 1px solid rgba(0, 206, 209, 0.25);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: center;
      margin-top: 1rem;
    }
    .bridge-panel a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--sola-teal);
      color: #000;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .bridge-panel a:hover { background: var(--sola-teal-bright); color: #000; }

    /* ============================================
       MOBILE AFFILIATE STRIP (Phase 4)
       ============================================ */
    .mobile-affiliate-strip {
      margin: 1.5rem 0;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }
    .strip-header { text-align: center; margin-bottom: 0.5rem; }
    .strip-label {
      color: rgba(212, 175, 55, 0.5);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .strip-title {
      color: var(--text-primary);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .strip-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 8px;
      justify-content: center;
    }
    .strip-btn {
      display: inline-block;
      padding: 6px 10px;
      background: rgba(0, 206, 209, 0.06);
      border: 1px solid rgba(0, 206, 209, 0.15);
      border-radius: 6px;
      color: rgba(232, 240, 247, 0.85);
      font-size: 0.68rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .strip-btn:active { background: rgba(0, 206, 209, 0.15); }
    .strip-footer {
      text-align: center;
      margin-top: 0.4rem;
      color: rgba(232, 240, 247, 0.6);
      font-size: 0.5rem;
      line-height: 1.3;
      padding: 0 1rem;
    }

    /* ============================================

  (function() {

    /* ============================================

       ============================================ */
    function $(id) { return document.getElementById(id); }
    function show(el) { if (el) el.style.display = ''; }
    function hide(el) { if (el) el.style.display = 'none'; }

    /* ============================================
       MOON PHASE CALCULATION
       Returns { name, glyph, illumination (0-100) }
       ============================================ */
    function getMoonPhase(dateObj) {
      var d = new Date(dateObj);
      /* Days since known new moon: Jan 6, 2000 18:14 UTC */
      var lp = 2551443; /* lunar period in seconds */
      var newMoon2000 = new Date(Date.UTC(2000, 0, 6, 18, 14, 0));
      var phaseSec = ((d.getTime() - newMoon2000.getTime()) / 1000) % lp;
      if (phaseSec < 0) phaseSec += lp;
      var phase = phaseSec / lp; /* 0 to 1 */
      var illum = Math.round((1 - Math.cos(2 * Math.PI * phase)) / 2 * 100);
      var name, glyph;
      if (phase < 0.03 || phase > 0.97)      { name = 'New Moon';        glyph = '&#127761;'; }
      else if (phase < 0.22)                  { name = 'Waxing Crescent'; glyph = '&#127762;'; }
      else if (phase < 0.28)                  { name = 'First Quarter';   glyph = '&#127763;'; }
      else if (phase < 0.47)                  { name = 'Waxing Gibbous';  glyph = '&#127764;'; }
      else if (phase < 0.53)                  { name = 'Full Moon';       glyph = '&#127765;'; }
      else if (phase < 0.72)                  { name = 'Waning Gibbous';  glyph = '&#127766;'; }
      else if (phase < 0.78)                  { name = 'Last Quarter';    glyph = '&#127767;'; }
      else                                     { name = 'Waning Crescent'; glyph = '&#127768;'; }
      return { name: name, glyph: glyph, illumination: illum };
    }

    /* ============================================
       SKY RATING
       Combines avg cloud cover + moon illum
       ============================================ */
    function skyRating(avgCloud, moonIllum) {
      if (avgCloud <= 20 && moonIllum <= 35) return { key: 'perfect', label: 'Perfect',          tip: 'Dark, clear skies. Faint stars, the Milky Way, and deep-sky objects should all be visible.' };
      if (avgCloud <= 30 && moonIllum <= 60) return { key: 'good',    label: 'Good',             tip: 'Clear enough for planets, bright stars, and constellations. Faint stuff washed out by moon or haze.' };
      if (avgCloud <= 60)                       return { key: 'fair',    label: 'Fair',             tip: 'Partial clouds. The moon and brightest planets still show through.' };
      if (avgCloud <= 85)                       return { key: 'poor',    label: 'Poor',             tip: 'Mostly cloudy. Maybe glimpses of the moon or Venus, but not much else.' };
      return                                          { key: 'skip',    label: 'Skip Tonight',     tip: 'Heavy cloud cover. Pour a coffee, watch a movie, try again tomorrow.' };
    }

    /* ============================================
       FORMAT HELPERS
       ============================================ */
    function formatTime(isoStr) {
      if (!isoStr) return '&mdash;';
      var d = new Date(isoStr);
      var h = d.getHours();
      var m = d.getMinutes();
      var ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12; if (h === 0) h = 12;
      return h + ':' + (m < 10 ? '0' + m : m) + ampm;
    }
    function formatHour(isoStr) {
      var d = new Date(isoStr);
      var h = d.getHours();
      var ampm = h >= 12 ? 'p' : 'a';
      h = h % 12; if (h === 0) h = 12;
      return h + ampm;
    }

    /* ============================================
       WHAT TO WEAR &mdash; Sola&rsquo;s voice
       Inputs: tempF, windMph, dewPointF, humidity, isClearSky
       Returns array of advice strings.
       ============================================ */
    function whatToWear(tempF, windMph, dewPointF, humidity, isClearSky) {
      var tips = [];
      var feelsLike = tempF - (windMph > 5 ? Math.round(windMph * 0.4) : 0);
      var dewSpread = Math.abs(tempF - dewPointF);

      /* Core clothing */
      if (tempF >= 75) {
        tips.push('Shorts and a t-shirt. Maybe bug spray.');
      } else if (tempF >= 60) {
        tips.push('Long sleeves or a light hoodie. Comfortable temp for sitting outside.');
      } else if (tempF >= 45) {
        tips.push('Jacket and long pants. A beanie if there&rsquo;s any wind.');
      } else if (tempF >= 32) {
        tips.push('Insulated coat, hat, gloves. Layer up &mdash; standing still gets cold fast.');
      } else {
        tips.push('Bundle up like you mean it. Heavy coat, hat, gloves, two layers on the legs. Hand warmers help.');
      }

      /* Wind chill */
      if (windMph >= 10 && tempF < 60) {
        tips.push('Wind picks up after sunset (' + windMph + ' mph) &mdash; feels like ' + feelsLike + '&deg;F. Set up behind a fence or building if you can.');
      }

      /* Dew warning */
      if (dewSpread <= 4 && isClearSky) {
        tips.push('Dew point is close to air temp &mdash; gear and eyepieces will fog up. Keep a microfiber cloth handy and tuck optics in your jacket between views.');
      }

      /* Frost warning */
      if (tempF <= 36 && humidity > 70) {
        tips.push('Frost likely on car windows and folding chairs. Wipe down before you sit.');
      }

      /* Bugs */
      if (tempF >= 55 && humidity > 60) {
        tips.push('Mosquitoes are still active. Bug spray or a citronella candle goes a long way.');
      }

      /* Hot ground */
      if (tempF >= 85) {
        tips.push('Even after sunset the ground holds heat. A folding chair beats sitting on concrete.');
      }

      /* Cold ground */
      if (tempF <= 50) {
        tips.push('Cold ground steals heat fast. Sit on a foam pad or folding chair, not the bare grass.');
      }

      /* Always */
      tips.push('Red-light flashlight only &mdash; white light kills your night vision for 20 minutes.');

      return tips;
    }

    /* ============================================
       GEOCODE ZIP &mdash; Nominatim (free, no key)
       ============================================ */
    function geocodeZip(zip) {
      var url = 'https://nominatim.openstreetmap.org/search?postalcode=' +
                encodeURIComponent(zip) + '&country=US&format=json&limit=1';
      return fetch(url, { headers: { 'Accept': 'application/json' } })
        .then(function(r) {
          if (!r.ok) throw new Error('Geocode failed');
          return r.json();
        })
        .then(function(arr) {
          if (!arr || !arr.length) throw new Error('Zip code not found');
          var hit = arr[0];
          var displayParts = (hit.display_name || '').split(',');
          var cityGuess = displayParts[0] || zip;
          return {
            lat: parseFloat(hit.lat),
            lon: parseFloat(hit.lon),
            city: cityGuess.trim()
          };
        });
    }

    /* ============================================
       FETCH WEATHER &mdash; Open-Meteo (free, no key)
       ============================================ */
    function fetchWeather(lat, lon) {
      var url = 'https://api.open-meteo.com/v1/forecast' +
                '?latitude=' + lat + '&longitude=' + lon +
                '&hourly=cloud_cover,temperature_2m,wind_speed_10m,relative_humidity_2m,dew_point_2m' +
                '&daily=sunrise,sunset' +
                '&temperature_unit=fahrenheit' +
                '&wind_speed_unit=mph' +
                '&timezone=auto' +
                '&forecast_days=8';
      return fetch(url)
        .then(function(r) {
          if (!r.ok) throw new Error('Weather fetch failed');
          return r.json();
        });
    }

    /* ============================================
       FETCH SKY DATA &mdash; sky.js aggregator
       Returns combined payload: planets, moon, sun, apod, asteroids, spaceWeather.
       Soft-fails: returns null on error so the page can still render with weather only.
       ============================================ */
    function fetchSkyData(lat, lon) {
      var url = '/api/sky?lat=' + lat + '&lon=' + lon;
      return fetch(url)
        .then(function(r) {
          if (!r.ok) throw new Error('Sky API returned ' + r.status);
          return r.json();
        })
        .then(function(data) {
          if (!data || !data.success) throw new Error('Sky API returned error');
          return data;
        })
        .catch(function(err) {
          /* Soft fail: log but return null so the page degrades gracefully */
          if (window.console) console.warn('Sky data unavailable:', err.message);
          return null;
        });
    }

    function getCurrentConstellation() {
      var month = new Date().getMonth();
      return CONSTELLATIONS_BY_MONTH[month];
    }

    /* ============================================
       BUILD TONIGHT WINDOW
       Pulls hourly data 7pm tonight to 5am tomorrow
       ============================================ */
    function buildTonightWindow(weather) {
      var hourly = weather.hourly;
      if (!hourly || !hourly.time) return null;

      var times = hourly.time;
      var clouds = hourly.cloud_cover;
      var temps = hourly.temperature_2m;
      var winds = hourly.wind_speed_10m;
      var humid = hourly.relative_humidity_2m;
      var dewpt = hourly.dew_point_2m;

      var now = new Date();
      var todayStr = now.toISOString().split('T')[0];
      var tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
      var tomorrowStr = tomorrow.toISOString().split('T')[0];

      var windowHours = [];
      for (var i = 0; i < times.length; i++) {
        var ts = times[i];
        var dateStr = ts.split('T')[0];
        var hour = parseInt(ts.split('T')[1].split(':')[0], 10);
        /* Tonight: 7pm-11pm today, 12am-5am tomorrow */
        var inTonight = (dateStr === todayStr && hour >= 19) ||
                        (dateStr === tomorrowStr && hour <= 5);
        if (inTonight) {
          windowHours.push({
            time: ts,
            hour: hour,
            cloud: clouds[i],
            temp: temps[i],
            wind: winds[i],
            humidity: humid[i],
            dewPoint: dewpt[i]
          });
        }
      }
      return windowHours;
    }

    /* ============================================
       SUN / TWILIGHT TIMES
       Open-Meteo gives sunrise/sunset; we calculate
       civil/nautical/astronomical twilight as offsets.
       Approximate offsets: civil = +30min, nautical = +60min, astro = +90min from sunset.
       ============================================ */
    function getTwilights(weather) {
      var daily = weather.daily;
      if (!daily || !daily.sunset) return null;
      var sunset = new Date(daily.sunset[0]);
      var sunrise = new Date(daily.sunrise[1]); /* tomorrow&apos;s sunrise */
      function offsetMin(d, mins) { return new Date(d.getTime() + mins * 60000); }
      return {
        sunset: sunset,
        civilDark: offsetMin(sunset, 30),
        nauticalDark: offsetMin(sunset, 60),
        astroDark: offsetMin(sunset, 90),
        astroDawn: offsetMin(sunrise, -90),
        nauticalDawn: offsetMin(sunrise, -60),
        civilDawn: offsetMin(sunrise, -30),
        sunrise: sunrise
      };
    }

    /* ============================================
       RENDER &mdash; Tonight panel

          if (p.name === 'Uranus' || p.name === 'Neptune' || p.name === 'Pluto') return false;

            if (tip) html += ' <span style="color:var(--text-muted);font-size:0.82rem;">' + tip + '</span>';
            html += '</div>';
            html += '</div>';
          });
          html += '</div>';
          html += '<div style="margin-top:0.6rem;font-size:0.75rem;color:var(--text-muted);">Positions calculated for your location at evening reference time. &deg; up = degrees above the horizon (90&deg; = directly overhead).</div>';
          html += '</section>';
        }
      } else if (planetsRender.list.length) {
        /* Fallback: month-based lookup, no altitude data */
        html += '<section class="section">';
        html += '<h2 class="section-title">&#129680; Planets You Can See Tonight</h2>';
        html += '<div style="display:flex;flex-direction:column;gap:0.5rem;">';
        planetsRender.list.forEach(function(p) {

      /* What to wear &mdash; Sola voice */

          if (!state.zip) return;
          var shareUrl = window.location.origin + window.location.pathname + '?zip=' + state.zip;
          /* Use Clipboard API if available; fall back to a temporary textarea */
          var done = function() {
            if (feedback) {
              feedback.textContent = '\u2713 Link copied! Paste it anywhere to share tonight\u2019s sky for ' + state.city + '.';
              setTimeout(function() { if (feedback) feedback.textContent = ''; }, 4000);
            }
          };
          var fail = function() {
            if (feedback) {
              feedback.style.color = 'var(--loss)';
              feedback.textContent = 'Could not copy automatically. Link: ' + shareUrl;
              setTimeout(function() {
                if (feedback) {
                  feedback.textContent = '';
                  feedback.style.color = 'var(--rating-perfect)';
                }
              }, 8000);
            }
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(shareUrl).then(done).catch(function() {
              /* Fallback for older browsers / restricted contexts */
              fallbackCopy(shareUrl, done, fail);
            });
          } else {
            fallbackCopy(shareUrl, done, fail);
          }
          /* Also update the URL in the address bar so a refresh keeps the same zip */
          try {
            window.history.replaceState({}, '', shareUrl);
          } catch (e) {}
        });
      }
    }

    /* Manual textarea-based clipboard fallback for environments without
       navigator.clipboard (older mobile browsers, non-HTTPS contexts). */
    function fallbackCopy(text, onSuccess, onFail) {
      try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) onSuccess(); else onFail();
      } catch (e) {
        onFail();
      }
    }

    /* ============================================
       PHASE 3 &mdash; 7-NIGHT OUTLOOK
       Builds nightly summaries: per-night avg cloud, moon, rating
       ============================================ */
    function buildNightlySummaries(weather) {
      var hourly = weather.hourly;
      if (!hourly || !hourly.time) return [];

      var times = hourly.time;
      var clouds = hourly.cloud_cover;

      /* Group by "viewing night" = 7pm tonight + 12-5am tomorrow */
      var nights = {};
      for (var i = 0; i < times.length; i++) {
        var ts = times[i];
        var d = new Date(ts);
        var hour = d.getHours();
        var dayDate = new Date(d);
        /* If hour is between 0-5am, attribute to PREVIOUS day's night */
        if (hour <= 5) dayDate.setDate(dayDate.getDate() - 1);
        /* Only include 7pm-5am hours */
        if (hour < 19 && hour > 5) continue;
        var key = dayDate.toISOString().split('T')[0];
        if (!nights[key]) nights[key] = { date: new Date(dayDate), clouds: [] };
        nights[key].clouds.push(clouds[i]);
      }

      /* Build sorted array */
      var keys = Object.keys(nights).sort();
      var summaries = [];
      for (var k = 0; k < keys.length && summaries.length < 7; k++) {
        var n = nights[keys[k]];
        if (!n.clouds.length) continue;
        var avg = Math.round(n.clouds.reduce(function(s, c) { return s + c; }, 0) / n.clouds.length);
        /* Get moon phase for that night (use 11pm of that date) */
        var moonRef = new Date(n.date);
        moonRef.setHours(23, 0, 0, 0);
        var moon = getMoonPhase(moonRef);
        var rating = skyRating(avg, moon.illumination);
        summaries.push({
          date: n.date,
          avgCloud: avg,
          moon: moon,
          rating: rating
        });
      }
      return summaries;
    }

    function pickBestNight(summaries) {
      if (!summaries.length) return null;
      /* Score: lower cloud + lower moon = better. Weight cloud heavier. */
      var scored = summaries.map(function(s, idx) {
        return {
          idx: idx,
          score: (s.avgCloud * 1.5) + (s.moon.illumination * 0.5),
          summary: s
        };
      });
      scored.sort(function(a, b) { return a.score - b.score; });
      return scored[0];
    }

    /* ============================================
       PHASE 3 &mdash; SOLA&rsquo;S ROTATING TIP
       One tip per page load, picked by date so it&rsquo;s
       stable within a day but rotates daily.
       ============================================ */
    var SOLA_TIPS = [
      'Red-light flashlight only when you&rsquo;re reading or moving around. White light kills your night vision for 20 minutes &mdash; every time.',

      'Look slightly off to the side of a faint object instead of directly at it. Your peripheral vision picks up dim light better. It&rsquo;s called averted vision.',
      'Cold ground steals heat through a folding chair faster than you&rsquo;d think. Throw a blanket over the chair before you sit.',
      'Mars looks orange-red, Venus is brilliant white, Jupiter is steady cream-white, Saturn is yellowish. Color is the easiest way to tell planets apart.',
      'Stars twinkle. Planets don&rsquo;t (much). If a bright dot near the horizon is rock-steady, it&rsquo;s probably a planet.',
      'Clear nights are also free-electricity nights for solar miners. If you&rsquo;re up watching the sky, your panels worked overtime today.',
      'A folding camp chair, a thermos, and a phone on red-screen mode is a complete stargazing kit. You don&rsquo;t need a telescope to start.',
      'The Milky Way is brightest in the summer in the northern hemisphere. Look south, away from city lights, after midnight in July or August.',
      'If your zip is in a Bortle 6 or worse zone, drive 30 minutes to a darker site once. The difference will surprise you.',
      'The moon is best seen when it&rsquo;s NOT full &mdash; quarter phases show shadows along the terminator line, where craters pop in 3D.',
      'Dew is the silent enemy of optics. If your eyepieces fog, tuck them inside your jacket between views. Body heat dries them out.',
      'A satellite moves in a straight line at constant speed across the sky in 1 to 6 minutes. A meteor is a flash, gone in under a second.',
      'The ISS is the third-brightest object in the sky after the sun and moon. If you see what looks like a fast-moving plane with no blinking lights, that&rsquo;s probably it.'
    ];

    function getSolaTip() {
      var dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
      return SOLA_TIPS[dayOfYear % SOLA_TIPS.length];
    }

    /* ============================================
       PHASE 3 RENDER &mdash; outlook panel
       7-night outlook strip + best-night callout + Sola tip
       ============================================ */
    function renderOutlook() {
      var panel = $('outlook-panel');
      if (!panel) return;

      var summaries = buildNightlySummaries(state.data);
      var best = pickBestNight(summaries);
      var tip = getSolaTip();

      var html = '';

      /* Best night callout (only if there&rsquo;s a clear winner that&rsquo;s actually decent) */
      if (best && best.summary.rating.key !== 'skip' && best.summary.rating.key !== 'poor') {
        var bn = best.summary;
        var dayName = bn.date.toLocaleDateString('en-US', { weekday: 'long' });
        var dateStr = bn.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        html += '<section class="section" style="border-color:var(--sola-gold);background:linear-gradient(135deg,rgba(212,175,55,0.10),var(--bg-card));">';
        html += '<h2 class="section-title" style="color:var(--sola-gold);">&#11088; Your Best Night This Week</h2>';
        html += '<div style="font-size:1.1rem;color:var(--text-primary);margin-bottom:0.4rem;"><strong>' + dayName + ' (' + dateStr + ')</strong> &mdash; ' + bn.rating.label + '</div>';
        html += '<div style="color:var(--text-secondary);font-size:0.9rem;">' + bn.avgCloud + '% avg cloud cover, ' + bn.moon.illumination + '% moon illumination. ' + bn.rating.tip + '</div>';
        html += '</section>';
      }

      /* 7-night outlook */
      if (summaries.length) {
        html += '<section class="section">';
        html += '<h2 class="section-title">&#128197; 7-Night Outlook</h2>';
        html += '<div class="night-outlook">';
        summaries.forEach(function(s, idx) {

          html += '<div class="night-day">' + dayName + '</div>';
          html += '<div class="night-date">' + dateNum + '</div>';

          html += '</div>';
        });

      /* Satellite passes (ISS, Hubble, Tiangong) */
      html += '<section class="section">';

    /* ===== SATELLITE PASS RENDERING ===== */
    function renderSatellitesContent(passes) {
      if (!Array.isArray(passes)) {
        return '<div style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;">' +
          'Satellite tracking is loading separately and isn&rsquo;t ready right now. ' +
          'Check passes at <a href="https://www.heavens-above.com/" target="_blank" rel="noopener">Heavens-Above</a> ' +
          'or <a href="https://spotthestation.nasa.gov/" target="_blank" rel="noopener">NASA Spot the Station</a>.' +
          '</div>';
      }

      if (!passes.length) {
        return '<div style="color:var(--text-secondary);font-size:0.9rem;padding:0.5rem 0;">No bright satellite passes from your location in the next 48 hours.</div>';
      }

      /* Show top 8 chronologically; passes already sorted by sky.js */
      var top = passes.slice(0, 8);
      var now = new Date();
      var tomorrow = new Date(now.getTime() + 86400000);

      var html = '<div class="pass-list">';
      top.forEach(function(p) {
        var startD = new Date(p.start);
        var startTime = formatTime(p.start);
        var dayLabel = startD.toDateString() === now.toDateString() ? 'Tonight' :
                       startD.toDateString() === tomorrow.toDateString() ? 'Tomorrow' :
                       startD.toLocaleDateString('en-US', { weekday: 'short' });
        var durationMin = p.duration ? Math.round(p.duration / 60) : null;

        /* N2YO returns 100000 when magnitude can't be determined */
        var magStr = '';
        if (typeof p.magnitude === 'number' && p.magnitude < 99999) {
          magStr = ' &middot; mag ' + p.magnitude.toFixed(1);
        }

        var elevStr = '';
        if (typeof p.maxElevation === 'number') {
          elevStr = ' &middot; ' + p.maxElevation + '&deg; max';
        }

        html += '<div class="pass-item">';
        html += '<div>';
        html += '<div class="pass-name">&#128752; ' + p.name + '</div>';
        html += '<div class="pass-detail">' + dayLabel + ' &middot; ' + (p.direction || 'see N2YO');
        if (durationMin) html += ' &middot; ' + durationMin + ' min';
        html += elevStr + magStr;
        html += '</div>';
        html += '</div>';
        html += '<div class="pass-time">' + startTime + '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '<div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-muted);">';
      html += 'Times shown are local. Lower magnitude = brighter (the ISS averages around &minus;3, brighter than any star). ';
      html += 'Look in the start direction at the listed time and watch for a steady (non-blinking) light moving across the sky.';
      html += '</div>';
      return html;
    }

    /* ===== METEOR SHOWER RENDERING =====
       Auto-shows showers active in the next 30 days.
       "Active" = today is between window_start and window_end.
       "Upcoming" = window_start is within next 30 days.
       Sorted by peak date ascending. */
    function renderMeteorShowersContent(showers) {
      if (!Array.isArray(showers)) {
        return '<div style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;">' +
          'Meteor shower calendar isn&rsquo;t loaded right now. ' +
          'See the full year at <a href="https://www.imo.net/resources/calendar/" target="_blank" rel="noopener">International Meteor Organization</a>.' +
          '</div>';
      }

      var now = new Date();
      var horizon = new Date(now.getTime() + 30 * 86400000);

      /* Filter to showers active now or starting within 30 days */
      var relevant = showers.filter(function(s) {
        var winStart = new Date(s.window_start);
        var winEnd = new Date(s.window_end);
        var isActive = now >= winStart && now <= winEnd;
        var isUpcoming = winStart > now && winStart <= horizon;
        return isActive || isUpcoming;
      });

      /* Sort by peak date */
      relevant.sort(function(a, b) {
        return new Date(a.peak).getTime() - new Date(b.peak).getTime();
      });

      if (!relevant.length) {
        /* Find the next upcoming shower beyond the 30-day horizon for context */
        var nextShower = showers
          .filter(function(s) { return new Date(s.window_start) > now; })
          .sort(function(a, b) { return new Date(a.window_start).getTime() - new Date(b.window_start).getTime(); })[0];

        var html = '<div style="color:var(--text-secondary);font-size:0.9rem;padding:0.25rem 0;">';
        html += 'No major meteor showers active in the next 30 days. ';
        if (nextShower) {
          var peakD = new Date(nextShower.peak);
          html += 'The <strong style="color:var(--text-primary);">' + nextShower.name + '</strong> peak ';
          html += 'is coming up on ' + peakD.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) + '.';
        }
        html += '</div>';
        return html;
      }

      var html = '<div class="event-list">';
      relevant.forEach(function(s) {
        var peakD = new Date(s.peak);
        var winStart = new Date(s.window_start);
        var winEnd = new Date(s.window_end);
        var isActive = now >= winStart && now <= winEnd;
        var daysToPeak = Math.round((peakD.getTime() - now.getTime()) / 86400000);

        /* Status label */
        var statusLabel;
        if (isActive && daysToPeak === 0) {
          statusLabel = '<span style="color:var(--rating-perfect);font-weight:700;">PEAK TONIGHT</span>';
        } else if (isActive && daysToPeak > 0 && daysToPeak <= 7) {
          statusLabel = '<span style="color:var(--sola-gold);font-weight:700;">ACTIVE &middot; peaks in ' + daysToPeak + ' day' + (daysToPeak === 1 ? '' : 's') + '</span>';
        } else if (isActive && daysToPeak > 7) {
          statusLabel = '<span style="color:var(--sola-teal);">Active &middot; peak ' + peakD.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + '</span>';
        } else if (isActive && daysToPeak < 0) {
          statusLabel = '<span style="color:var(--text-muted);">Active &middot; past peak (' + Math.abs(daysToPeak) + ' days ago)</span>';
        } else {
          /* Upcoming */
          var daysToStart = Math.round((winStart.getTime() - now.getTime()) / 86400000);
          statusLabel = '<span style="color:var(--text-secondary);">Begins in ' + daysToStart + ' day' + (daysToStart === 1 ? '' : 's') + ' &middot; peaks ' + peakD.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + '</span>';
        }

        /* ZHR rating descriptor */
        var rateDesc;
        if (s.zhr >= 100) rateDesc = 'Very strong &mdash; up to ' + s.zhr + ' meteors/hour at peak under perfect conditions';
        else if (s.zhr >= 50) rateDesc = 'Strong &mdash; up to ' + s.zhr + ' meteors/hour at peak';
        else if (s.zhr >= 20) rateDesc = 'Moderate &mdash; up to ' + s.zhr + ' meteors/hour at peak';
        else rateDesc = 'Modest &mdash; about ' + s.zhr + ' meteors/hour at peak';

        html += '<div class="event-item">';
        html += '<div class="event-date">' + statusLabel + '</div>';
        html += '<div class="event-title">&#9732; ' + s.name + '</div>';
        html += '<div class="event-desc">';
        html += rateDesc + '. ';
        if (s.best_viewing) html += s.best_viewing + '. ';
        if (s.notes) html += '<span style="color:var(--text-muted);">' + s.notes + '</span>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '<div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-muted);">';
      html += 'ZHR (Zenithal Hourly Rate) is the maximum count per hour under perfect conditions with the radiant directly overhead. Real counts are usually lower &mdash; expect roughly half ZHR from a dark site, much less from suburbs.';
      html += '</div>';
      return html;
    }

    /* ===== AURORA RENDERING =====
       Returns full <section> markup. Visibility-driven styling:
       - 'likely' = green border (you can see it from your latitude)
       - 'possible' = teal border (worth trying)
       - 'edge' = gold border (long shot but possible)
       - 'unlikely' = standard border (informational only)
       Active storm callout shown when geomagnetic storm in progress. */
    function renderAuroraSection(auroraData) {
      var visBorderColor = {
        likely: 'var(--rating-perfect)',
        possible: 'var(--sola-teal)',
        edge: 'var(--sola-gold)',
        unlikely: 'var(--border-color)'
      }[auroraData.visibility] || 'var(--border-color)';

      var visBgGradient = {
        likely: 'linear-gradient(135deg,rgba(74,222,128,0.10),var(--bg-card))',
        possible: 'linear-gradient(135deg,rgba(0,206,209,0.08),var(--bg-card))',
        edge: 'linear-gradient(135deg,rgba(212,175,55,0.08),var(--bg-card))',
        unlikely: 'var(--bg-card)'
      }[auroraData.visibility] || 'var(--bg-card)';

      var visEmoji = {
        likely: '&#127775;',
        possible: '&#127775;',
        edge: '&#127770;',
        unlikely: '&#127769;'
      }[auroraData.visibility] || '&#127770;';

      var html = '<section class="section" style="border-color:' + visBorderColor + ';background:' + visBgGradient + ';">';
      html += '<h2 class="section-title">' + visEmoji + ' Aurora Forecast Tonight</h2>';

      /* Active storm callout (highest priority info) */
      if (auroraData.activeStorms && auroraData.activeStorms.length) {
        var topStorm = auroraData.activeStorms.reduce(function(max, s) {
          return (!max || s.kp > max.kp) ? s : max;
        }, null);
        if (topStorm) {
          html += '<div style="padding:0.7rem 0.95rem;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.4);border-radius:8px;margin-bottom:0.85rem;">';
          html += '<div style="font-weight:700;color:var(--rating-perfect);font-size:0.9rem;">&#9889; Geomagnetic Storm in Progress &mdash; ' + (topStorm.scale || ('Kp ' + topStorm.kp.toFixed(1))) + '</div>';
          html += '<div style="color:var(--text-primary);font-size:0.85rem;margin-top:0.25rem;">Auroras may be pushed unusually far south. Worth checking even from mid-latitudes.</div>';
          html += '</div>';
        }
      }

      /* Visibility summary */
      var visLabel = {
        likely:   'Likely Visible',
        possible: 'Possibly Visible',
        edge:     'Edge of Visibility',
        unlikely: 'Unlikely'
      }[auroraData.visibility] || 'Unknown';

      html += '<div style="margin-bottom:0.85rem;">';
      html += '<span class="rating-badge" style="background:' + visBorderColor + '20;color:' + visBorderColor + ';border:1px solid ' + visBorderColor + '60;">' + visLabel + '</span>';
      html += '</div>';

      html += '<div style="color:var(--text-primary);font-size:0.92rem;line-height:1.5;margin-bottom:0.85rem;">' + auroraData.summary + '</div>';

      /* Kp data row */
      html += '<div style="display:flex;flex-wrap:wrap;gap:1.25rem;font-size:0.85rem;color:var(--text-secondary);">';

      if (auroraData.current) {
        var curKp = typeof auroraData.current.kp === 'number' ? auroraData.current.kp.toFixed(1) : '&mdash;';
        var curLabel = auroraData.current.observed === 'observed' ? 'observed' :
                       auroraData.current.observed === 'estimated' ? 'estimated' : 'reported';
        html += '<div><strong style="color:var(--text-primary);">Current Kp:</strong> ' + curKp + ' <span style="color:var(--text-muted);font-size:0.8rem;">(' + curLabel + ')</span></div>';
      }

      if (auroraData.peak24h) {
        var peakKp = typeof auroraData.peak24h.kp === 'number' ? auroraData.peak24h.kp.toFixed(1) : '&mdash;';
        var peakD = new Date(auroraData.peak24h.time);
        var peakStr = !isNaN(peakD.getTime()) ? formatTime(auroraData.peak24h.time) : '';
        html += '<div><strong style="color:var(--text-primary);">Peak Next 24h:</strong> Kp ' + peakKp;
        if (peakStr) html += ' <span style="color:var(--text-muted);font-size:0.8rem;">around ' + peakStr + '</span>';
        html += '</div>';
      }

      if (typeof auroraData.auroraSouthernBoundary === 'number') {
        html += '<div><strong style="color:var(--text-primary);">Aurora Southern Edge:</strong> ' + auroraData.auroraSouthernBoundary + '&deg;N</div>';
      }

      html += '</div>';

      html += '<div style="margin-top:0.85rem;font-size:0.75rem;color:var(--text-muted);">';
      html += 'Kp 0&ndash;3 = quiet. Kp 4 = unsettled. Kp 5+ = G1 minor storm or stronger. Each step pushes auroras further south. ';
      html += 'Data: <a href="https://www.swpc.noaa.gov/products/planetary-k-index" target="_blank" rel="noopener">NOAA Space Weather Prediction Center</a>.';
      html += '</div>';

      html += '</section>';
      return html;
    }

    /* ===== ASTEROID RENDERING ===== */
    function renderAsteroidsContent(asteroids) {
      /* Sort by closest approach first; show top 5 */
      var sorted = asteroids.slice().sort(function(a, b) {
        return (a.missDistanceKm || Infinity) - (b.missDistanceKm || Infinity);
      });
      var top = sorted.slice(0, 5);

      var html = '<div class="event-list">';

        var sizeStr = a.diameterMeters ? a.diameterMeters.toLocaleString() + ' m wide' : '';
        var hazardBadge = a.hazardous
          ? '<span style="display:inline-block;margin-left:0.5rem;padding:0.1rem 0.45rem;background:rgba(239,68,68,0.18);color:var(--rating-skip);border:1px solid rgba(239,68,68,0.4);border-radius:999px;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;">PHA</span>'

        html += '<div class="event-desc">';
        if (sizeStr) html += sizeStr + ' &middot; ';
        if (lunarStr) html += 'misses by ' + lunarStr;
        if (a.velocityKmh) html += ' &middot; ' + Math.round(a.velocityKmh).toLocaleString() + ' km/h';

        if (a.url) {
          html += '<div style="margin-top:0.4rem;font-size:0.78rem;"><a href="' + a.url + '" target="_blank" rel="noopener">Details on NASA JPL &rarr;</a></div>';
        }
        html += '</div>';
      });
      html += '</div>';
      html += '<div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-muted);">A lunar distance is about 384,000 km. The moon is 1.0 lunar distance away. PHA = Potentially Hazardous Asteroid (close + large enough to track). None of these are predicted to hit Earth.</div>';
      return html;
    }

    function renderAsteroidsFallback() {
      return '<div style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;">' +
        'Asteroid data is loading separately and isn&rsquo;t ready right now. ' +
        'See close approaches at <a href="https://cneos.jpl.nasa.gov/ca/" target="_blank" rel="noopener">NASA JPL CNEOS</a>.' +
        '</div>';
    }

    /* ===== APOD RENDERING ===== */
    function renderAPODContent(apod) {
      var html = '<div class="apod-panel">';
      var media = apod.mediaType || apod.media_type;
      if (media === 'image' && apod.url) {
        html += '<img class="apod-image" src="' + apod.url + '" alt="' + (apod.title || 'NASA Astronomy Picture of the Day') + '" loading="lazy">';
      } else if (media === 'video' && apod.url) {
        html += '<div style="padding:1rem;background:var(--bg-card-solid);border-radius:8px;margin-bottom:0.75rem;color:var(--text-secondary);font-size:0.9rem;">';
        html += 'Today&rsquo;s NASA pick is a video. <a href="' + apod.url + '" target="_blank" rel="noopener">Watch it on NASA &rarr;</a>';
        html += '</div>';
      }
      html += '<div class="apod-title">' + (apod.title || 'NASA Astronomy Picture of the Day') + '</div>';
      if (apod.explanation) {
        var shortExp = apod.explanation.length > 400
          ? apod.explanation.substring(0, 400) + '&hellip;'
          : apod.explanation;
        html += '<div class="apod-explanation">' + shortExp + '</div>';
      }
      html += '<div style="margin-top:0.6rem;font-size:0.75rem;color:var(--text-muted);">';
      html += 'Source: <a href="https://apod.nasa.gov/apod/" target="_blank" rel="noopener">NASA APOD</a>';
      if (apod.copyright) html += ' &middot; &copy; ' + apod.copyright;
      html += '</div>';
      html += '</div>';
      return html;
    }

    function renderAPODFallback() {
      return '<div style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;">' +
        'Today&rsquo;s NASA Picture of the Day isn&rsquo;t loaded right now. ' +
        'See it directly at <a href="https://apod.nasa.gov/apod/" target="_blank" rel="noopener">apod.nasa.gov</a>.' +
        '</div>';
    }

    /* ===== SPACE WEATHER RENDERING ===== */
    function renderSpaceWeatherContent(events) {
      /* Group by type for cleaner display */
      var html = '';

      /* Highlight any geomagnetic storms first &mdash; aurora-relevant */
      var storms = events.filter(function(e) { return e.type === 'Geomagnetic Storm'; });
      if (storms.length) {
        var topStorm = storms[0];
        html += '<div style="padding:0.85rem 1rem;background:linear-gradient(135deg,rgba(74,222,128,0.10),rgba(0,206,209,0.06));border:1px solid rgba(74,222,128,0.35);border-radius:8px;margin-bottom:0.85rem;">';
        html += '<div style="font-weight:700;color:var(--rating-perfect);margin-bottom:0.3rem;">&#127775; Geomagnetic Storm in Progress</div>';
        html += '<div style="color:var(--text-primary);font-size:0.9rem;">' + topStorm.summary + '</div>';
        if (topStorm.link) {
          html += '<div style="margin-top:0.4rem;font-size:0.78rem;"><a href="' + topStorm.link + '" target="_blank" rel="noopener">Track this storm &rarr;</a></div>';
        }
        html += '</div>';
      }

      html += '<div class="event-list">';
      events.slice(0, 6).forEach(function(e) {
        var dateStr = '';
        if (e.time) {
          var d = new Date(e.time);
          if (!isNaN(d.getTime())) {
            dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + formatTime(e.time);
          }
        }
        var typeIcon = e.type === 'Solar Flare' ? '&#9728;&#65039;' :
                       e.type === 'Geomagnetic Storm' ? '&#127775;' :
                       e.type === 'Coronal Mass Ejection' ? '&#128165;' :
                       '&#10024;';
        html += '<div class="event-item">';
        html += '<div class="event-date">' + dateStr + (e.class ? ' &middot; ' + e.class : '') + '</div>';
        html += '<div class="event-title">' + typeIcon + ' ' + e.type + '</div>';
        html += '<div class="event-desc">' + e.summary + '</div>';
        if (e.link) {
          html += '<div style="margin-top:0.4rem;font-size:0.78rem;"><a href="' + e.link + '" target="_blank" rel="noopener">More on NASA DONKI &rarr;</a></div>';
        }
        html += '</div>';
      });
      html += '</div>';
      html += '<div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-muted);">Geomagnetic storms (Kp 5 and up) can push auroras south of their normal range. Solar flares and CMEs are what cause them, usually 1-3 days after a sun event.</div>';
      return html;
    }

    function renderSpaceWeatherFallback() {
      return '<div style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;">' +
        'Space weather data is loading separately and isn&rsquo;t ready right now. ' +
        'For aurora forecasts, see <a href="https://www.swpc.noaa.gov/products/aurora-30-minute-forecast" target="_blank" rel="noopener">NOAA Space Weather</a>.' +
        '</div>';
    }

    /* ============================================
       MAIN FLOW
       ============================================ */
    function loadForZip(zip) {
      var panel = $('tonight-panel');
      panel.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div style="color:var(--text-secondary);">Looking up the sky over ' + zip + '&hellip;</div></div>';

      geocodeZip(zip)
        .then(function(loc) {
          state.zip = zip;
          state.lat = loc.lat;
          state.lon = loc.lon;
          state.city = loc.city;
          try { localStorage.setItem(STORAGE_KEY, zip); } catch (e) {}
          /* Fetch weather, sky data, satellite passes, meteor showers, and aurora in parallel.
             All five soft-fail to null, so weather alone is enough to render the page. */
          return Promise.all([
            fetchWeather(loc.lat, loc.lon),
            fetchSkyData(loc.lat, loc.lon),
            fetchSatellitePasses(loc.lat, loc.lon),
            fetchMeteorShowers(),
            fetchAurora(loc.lat)
          ]);
        })
        .then(function(results) {
          state.data = results[0];
          state.skyData = results[1]; /* may be null if sky.js failed */
          state.satellites = results[2]; /* may be null if satellite endpoint failed */
          state.meteorShowers = results[3]; /* may be null if data file failed */
          state.aurora = results[4]; /* may be null if aurora endpoint failed */
          hide($('zip-screen'));
          renderTonight();
          renderOutlook();
          renderCloser();
        })
        .catch(function(err) {
          panel.innerHTML = '';
          $('zip-error').textContent = err.message || 'Could not load forecast for that zip.';
          show($('zip-screen'));
        });
    }

    /* ============================================
       INIT
       ============================================ */
    function init() {
      var form = $('zip-form');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          var zip = ($('zip-input').value || '').trim();
          $('zip-error').textContent = '';
          if (!/^\d{5}$/.test(zip)) {
            $('zip-error').textContent = 'Enter a valid 5-digit US zip code.';
            return;
          }
          loadForZip(zip);
        });
      }

      /* Determine which zip to auto-load.
         Priority: URL param ?zip=NNNNN > localStorage saved zip > none */
      var urlZip = null;
      try {
        var params = new URLSearchParams(window.location.search);
        var fromUrl = (params.get('zip') || '').trim();
        if (/^\d{5}$/.test(fromUrl)) urlZip = fromUrl;
      } catch (e) {}

      var savedZip = null;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && /^\d{5}$/.test(saved)) savedZip = saved;
      } catch (e) {}

      var autoZip = urlZip || savedZip;
      if (autoZip) {
        $('zip-input').value = autoZip;
        loadForZip(autoZip);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
